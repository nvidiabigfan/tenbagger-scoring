modules:
  revenue:
    weight: 25
    enabled: true    # 매출 가속도 — 구조적 변화의 핵심 선행지표

  etf:
    weight: 20
    enabled: true    # 기관 수급 변화 — discovery 조기 신호

  analyst:
    weight: 15
    enabled: true    # 애널리스트 컨센서스 변화 (coverage 확대 포함)

  size:
    weight: 15
    enabled: true    # 시총 비대칭 — sweet spot $300M~$5B 우대

  trends:
    weight: 15
    enabled: true    # Google Trends 관심 지속성

  buzz:
    weight: 10
    enabled: true    # Wikipedia 페이지뷰 기반 관심 증가

  youtube:
    weight: 0
    enabled: false   # 쿼터 제한으로 비활성 (Phase 2에서 채널품질 개선 후 재활성)

scoring:
  strong_buy_threshold: 75
  buy_threshold: 55
  hold_threshold: 35
  min_confidence: 0.3   # 이 미만이면 no_data 처리
