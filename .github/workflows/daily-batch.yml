name: Daily Batch

on:
  schedule:
    - cron: '0 12 * * 1-5'  # UTC 12:00 = KST 21:00, weekdays
  workflow_dispatch:
    inputs:
      force_reanalysis:
        description: 'Skip 24h cache and re-analyze all (1=force)'
        required: false
        default: '0'
      bulk_batch_max:
        description: 'Max stocks to analyze (default 95)'
        required: false
        default: '95'
jobs:
  watchlist-reanalysis:
    name: Watchlist Re-analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run watchlist batch
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python -m app.jobs.watchlist_batch

  bulk-analysis:
    name: Bulk Analysis + Ranking Snapshot
    runs-on: ubuntu-latest
    needs: watchlist-reanalysis
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run bulk analysis + ranking snapshot
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BULK_BATCH_MAX: ${{ github.event.inputs.bulk_batch_max || '95' }}
          FORCE_REANALYSIS: ${{ github.event.inputs.force_reanalysis || '0' }}
        run: python -m app.jobs.bulk_analysis_batch
